# Rust crate release on PR merge
# Copy to: .github/workflows/release-plz.yml
name: Release-plz

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  release:
    uses: rararulab/workflows/.github/workflows/rust-release-plz.yml@main
    secrets:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
