name: Add to project

on:
  workflow_call:
    inputs:
      runner:
        description: "Runner label"
        type: string
        # arc-runner-set: private repos on GitHub Free plan cannot use
        # ubuntu-latest for reusable workflows triggered by non-public callers.
        default: "arc-runner-set"
      project-url:
        description: "GitHub Projects V2 URL (e.g. https://github.com/orgs/rararulab/projects/1)"
        type: string
        required: true
    secrets:
      ADD_TO_PROJECT_TOKEN:
        description: "PAT with project write scope"
        required: true

jobs:
  add-to-project:
    name: Add to project board
    runs-on: ${{ inputs.runner }}
    steps:
      - name: Add to project
        uses: actions/add-to-project@v1.0.2
        with:
          project-url: ${{ inputs.project-url }}
          github-token: ${{ secrets.ADD_TO_PROJECT_TOKEN }}
