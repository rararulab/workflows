name: Rust Release-plz

on:
  workflow_call:
    inputs:
      runner:
        description: "Runner label"
        type: string
        default: "arc-runner-set"
    secrets:
      CARGO_REGISTRY_TOKEN:
        description: "Token for publishing to crates.io (optional)"
        required: false

permissions:
  contents: write

jobs:
  release-plz-release:
    name: Release-plz release
    runs-on: ${{ inputs.runner }}
    if: ${{ github.repository_owner == 'rararulab' && github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'release') }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Clean ignored files
        run: |
          rm -rf bin/
          git clean -fdX

      - name: Run release-plz
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
