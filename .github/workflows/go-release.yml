name: Go Release

on:
  workflow_call:
    inputs:
      version-file:
        description: "Path to the file containing the version constant"
        type: string
        default: "version.go"
      version-pattern:
        description: "sed pattern to extract version from the version file"
        type: string
        default: 's/^const Version = "\(.*\)"/\1/p'
      cliff-config:
        description: "Path to git-cliff config file"
        type: string
        default: "cliff.toml"
      runner:
        description: "Runner label"
        type: string
        default: "ubuntu-latest"

permissions:
  contents: write
  pull-requests: write

jobs:
  release-pr:
    name: Create or update release PR
    runs-on: ${{ inputs.runner }}
    if: "!startsWith(github.event.head_commit.message, 'chore(release):')"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine next version
        id: next
        run: |
          set -euo pipefail

          CURRENT=$(sed -n '${{ inputs.version-pattern }}' ${{ inputs.version-file }})
          echo "current=$CURRENT" >> $GITHUB_OUTPUT

          pip install git-cliff >/dev/null 2>&1 || true
          NEXT=$(git cliff --bumped-version 2>/dev/null | sed 's/^v//')

          if [ -z "$NEXT" ] || [ "$NEXT" = "$CURRENT" ]; then
            echo "No version bump needed"
            echo "bump=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "version=$NEXT" >> $GITHUB_OUTPUT
          echo "tag=v$NEXT" >> $GITHUB_OUTPUT
          echo "bump=true" >> $GITHUB_OUTPUT
          echo "Bumping $CURRENT -> $NEXT"

      - name: Update version file
        if: steps.next.outputs.bump == 'true'
        run: |
          VERSION="${{ steps.next.outputs.version }}"
          sed -i "s/const Version = \".*\"/const Version = \"$VERSION\"/" ${{ inputs.version-file }}

      - name: Generate changelog
        if: steps.next.outputs.bump == 'true'
        uses: orhun/git-cliff-action@v4
        with:
          config: ${{ inputs.cliff-config }}
          args: --tag ${{ steps.next.outputs.tag }}
        env:
          OUTPUT: CHANGELOG.md

      - name: Create release PR
        if: steps.next.outputs.bump == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: main
          commit-message: "chore(release): bump version to ${{ steps.next.outputs.version }}"
          branch: release/next
          title: "chore(release): v${{ steps.next.outputs.version }}"
          body: |
            ## Release `v${{ steps.next.outputs.version }}`

            Automated release preparation.

            ### Changes
            - Update `${{ inputs.version-file }}` to `${{ steps.next.outputs.version }}`
            - Refresh `CHANGELOG.md`

            ### After merge
            A GitHub Release with tag `v${{ steps.next.outputs.version }}` will be created automatically.
          add-paths: |
            ${{ inputs.version-file }}
            CHANGELOG.md
          labels: release

  publish-release:
    name: Publish GitHub release
    runs-on: ${{ inputs.runner }}
    if: startsWith(github.event.head_commit.message, 'chore(release):')
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract version
        id: release
        run: |
          set -euo pipefail
          VERSION=$(sed -n '${{ inputs.version-pattern }}' ${{ inputs.version-file }})
          if [ -z "$VERSION" ]; then
            echo "Unable to determine version" >&2
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create and push tag
        run: |
          TAG="${{ steps.release.outputs.tag }}"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Get previous tag
        id: prev_tag
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          echo "tag=$PREV_TAG" >> $GITHUB_OUTPUT

      - name: Generate release notes
        id: changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: ${{ inputs.cliff-config }}
          args: >-
            ${{ steps.prev_tag.outputs.tag && format('{0}..{1}', steps.prev_tag.outputs.tag, steps.release.outputs.tag) || steps.release.outputs.tag }}
        env:
          OUTPUT: /tmp/RELEASE_CHANGELOG.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          body: ${{ steps.changelog.outputs.content }}
          draft: false
          prerelease: false
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
